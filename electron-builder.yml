appId: com.aiierp.desktop
productName: AI iERP
copyright: Copyright © 2026 AI iERP

directories:
  output: release

afterPack: ./scripts/after-pack.js

files:
  - src/**/*
  - resources/icon.png
  - resources/icon-win.ico
  - '!**/*.map'

win:
  icon: resources/icon-win.ico
  # No code-signing cert -> keep false (avoids signtool exit-2); the iERP icon is
  # embedded by the afterPack hook instead.
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
